{% extends 'reception/base.html' %}

{% block title %}Вход{% endblock %}

{% block content %}
<div class="form_wrapper">
    <div class="form_container">
        <div class="main_card">
            <div class="main_card_header">Вход</div>
            
            {% if messages %}
                {% for message in messages %}
                <div class="form_error" style="margin-bottom: 15px; 
                    {% if message.tags == 'success' %}background-color: #d4edda; color: #155724;
                    {% elif message.tags == 'error' %}background-color: #f8d7da; color: #721c24;
                    {% endif %}">
                    {{ message }}
                </div>
                {% endfor %}
            {% endif %}
            
            <form method="post">
                {% csrf_token %}
                <div class="form_field">
                    <label>Имя пользователя</label>
                    <input type="text" name="username" required class="search_field_input">
                </div>
                <div class="form_field">
                    <label>Пароль</label>
                    <input type="password" name="password" required class="search_field_input">
                </div>
                <div class="flex_buttons">
                    <button type="submit" class="btn_success">Войти</button>
                    <a href="{% url 'service_reception:register' %}" class="btn_secondary">Регистрация</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
